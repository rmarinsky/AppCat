name: BrowserCat
options:
  bundleIdPrefix: ua.com.rmarinsky
  developmentLanguage: uk
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"

packages:
  LaunchAtLogin:
    url: https://github.com/sindresorhus/LaunchAtLogin-Modern
    from: 1.0.0
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.9.0
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: 2.0.0

configs:
  Debug: debug
  Release: release

settings:
  base:
    MARKETING_VERSION: "1.7.2"
    CURRENT_PROJECT_VERSION: "46"
    DEVELOPMENT_TEAM: "8JL9TM5WLG"
    CODE_SIGN_STYLE: Automatic
    ARCHS: "arm64 x86_64"
    ENABLE_HARDENED_RUNTIME: YES
  configs:
    Debug:
      ONLY_ACTIVE_ARCH: YES
    Release:
      ONLY_ACTIVE_ARCH: NO

configFiles:
  Debug: Config/Debug.xcconfig
  Release: Config/Release.xcconfig

targets:
  BrowserCat:
    type: application
    platform: macOS
    sources:
      - path: BrowserCat
        excludes:
          - "**/.DS_Store"
    dependencies:
      - package: LaunchAtLogin
      - package: Sparkle
      - package: KeyboardShortcuts
    settings:
      base:
        INFOPLIST_FILE: BrowserCat/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: BrowserCat/Resources/BrowserCat.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        LD_RUNPATH_SEARCH_PATHS:
          - "@executable_path/../Frameworks"
        COMBINE_HIDPI_IMAGES: YES
        PRODUCT_MODULE_NAME: BrowserCat
      configs:
        Debug:
          PRODUCT_NAME: "BrowserCat DEV"
          PRODUCT_BUNDLE_IDENTIFIER: ua.com.rmarinsky.browsercat.dev
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEV_BUILD DEBUG
        Release:
          PRODUCT_NAME: "BrowserCat"
          PRODUCT_BUNDLE_IDENTIFIER: ua.com.rmarinsky.browsercat

  BrowserCatTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: BrowserCatTests
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: BrowserCat
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ua.com.rmarinsky.browsercat.tests
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/BrowserCat DEV.app/Contents/MacOS/BrowserCat DEV"
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: "8JL9TM5WLG"

schemes:
  BrowserCat DEV:
    build:
      targets:
        BrowserCat: all
        BrowserCatTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - BrowserCatTests
    archive:
      config: Debug

  BrowserCat:
    build:
      targets:
        BrowserCat: all
    run:
      config: Release
    archive:
      config: Release
